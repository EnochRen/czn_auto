name: 打包 EXE

# 触发方式：
#   1. 手动触发（Actions 页面点 Run workflow）
#   2. 推送形如 v1.0.0 的 tag 时自动打包并发布 Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller packaging/czn_auto.spec --clean --noconfirm

      - name: 复制配置与模板到产物目录
        shell: pwsh
        run: |
          Copy-Item config.json dist/config.json -Force
          Copy-Item templates dist/templates -Recurse -Force
          Copy-Item bin dist/bin -Recurse -Force
          New-Item -ItemType Directory -Force -Path dist/logs | Out-Null

      - name: 打包为 zip
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath CZN_Zero_Farm.zip -Force

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: CZN_Zero_Farm
          path: CZN_Zero_Farm.zip

      - name: 发布 Release（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CZN_Zero_Farm.zip
